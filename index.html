<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pompey Defence</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        overflow: hidden; /* Prevent scrollbars */
        background-color: #000;
        font-family: Arial, sans-serif;
      }
      #gameContainer {
        position: relative;
        width: 100vw;
        height: 100vh;
      }
      #app {
        width: 100%;
        height: 100%;
      }
      canvas {
        display: block;
      }
      #ui {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        color: #fff;
        font-size: 18px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        pointer-events: none; /* Let clicks pass through to canvas */
        z-index: 10;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
      }
      #stats, #towerSelect {
        pointer-events: auto; /* Re-enable clicks for UI elements */
        background: rgba(0, 0, 0, 0.5);
        padding: 10px 20px;
        border-radius: 10px;
      }
      #stats {
        display: flex;
        gap: 40px;
      }
      #towerSelect {
        display: flex;
        gap: 10px;
      }
      .tower-btn {
        padding: 10px 20px;
        background-color: #333;
        color: #fff;
        border: 2px solid #555;
        cursor: pointer;
        font-weight: bold;
        border-radius: 5px;
      }
      .tower-btn.selected {
        border-color: #00ff00;
        background-color: #444;
      }
      .tower-btn:hover {
        background-color: #555;
      }
    </style>
  </head>
  <body>
    <div id="gameContainer">
      <div id="app"></div>
      <div id="ui">
        <div id="stats">
          <div>Gold: <span id="gold">500</span></div>
          <div>Lives: <span id="lives">20</span></div>
          <div>Score: <span id="score">0</span></div>
          <div>Wave: <span id="wave">1</span></div>
        </div>
        <div id="towerSelect">
          <button class="tower-btn selected" id="basicTowerBtn">King of portsmouth(100g)</button>
          <button class="tower-btn" id="strongerTowerBtn">Spinnaker Tower (250g)</button>
          <button class="tower-btn" id="dogTowerBtn">Dog Tower (50g)</button>
        </div>

      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
